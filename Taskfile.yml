version: "3"

tasks:
  install:
    desc: Install dependencies
    cmds:
      - pnpm install

  build:
    desc: Build all packages
    cmds:
      - pnpm -r run build

  dev:
    desc: Start server and frontend in development mode
    deps:
      - dev:server
      - dev:web

  dev:server:
    desc: Start the backend server in development mode
    dir: packages/server
    cmds:
      - pnpm run dev

  dev:web:
    desc: Start the frontend dev server
    dir: packages/web
    cmds:
      - pnpm run dev

  storybook:
    desc: Start the storybook preview server
    dir: packages/web
    cmds:
      - pnpm run storybook

  typecheck:
    desc: Type-check all packages
    cmds:
      - pnpm -r run typecheck

  clean:
    desc: Remove all build artifacts
    cmds:
      - pnpm -r exec rm -rf dist
